name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master"]
  pull_request:
    branches: [ "main", "master"]

jobs:
  test-and-lint:
    name: 🧪 Run Tests & Syntax Check
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 🛠️ Install System Dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y libmagic-dev poppler-utils tesseract-ocr

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔍 Check Python Syntax (Compile Check)
      run: |
        python -m compileall -q .

    - name: 🚦 Run Unit Tests
      run: |
        python -m unittest discover -s tests -v

  docker-build:
    name: 🐳 Verify Docker Build
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🛠️ Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🚀 Verify Dockerfile Build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: seo-agent:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
